<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Administrador</title>
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/login.css"> </head>
<body class="login-body">
  <div class="bg-particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="login-screen">
    <div class="logo-container">
      <div class="logo-circle">
        <img src="img/logo.png" alt="Logo">
      </div>
    </div>

    <h1>Administración Florería Diente de León</h1>

    <form id="loginForm" onsubmit="return false;">
      <div class="input-group">
        <i class="fa-solid fa-user input-icon"></i>
        <input type="email" id="loginEmail" name="email" autocomplete="username" placeholder="Email" required>
      </div>

      <div class="input-group">
        <i class="fa-solid fa-lock input-icon"></i>
        <input type="password" id="loginPassword" name="password" autocomplete="current-password" placeholder="Password" required>
        <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
      </div>

      <button type="submit" id="submitBtn">Iniciar sesión</button>
      <div id="loginStatus"></div>
    </form>
  </div>
  <script type="module" src="js/controllers/loginController.js"></script>
</body>
</html>
