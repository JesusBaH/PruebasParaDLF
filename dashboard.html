<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Diente de León</title>
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="bg-particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="dashboard-wrapper">
    <aside class="sidebar-panel">
      <div class="sidebar-logo-box">
        <img src="img/logo.png" alt="Logo">
      </div>
      <div class="sidebar-info">
        <span>Panel Administrativo</span>
        <p>Florería Diente de León</p>
      </div>
      <button id="logoutBtn" class="btn-logout">
        <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
      </button>
    </aside>

    <main class="content-panel">
      <div class="dashboard-card">
        <h2>Subir Nuevo Arreglo</h2>
        
        <form id="uploadForm">
          <div class="input-group">
            <i class="fa-solid fa-tag input-icon"></i>
            <input type="text" id="itemName" placeholder="Nombre del ramo" required>
          </div>

          <div class="input-group">
            <i class="fa-solid fa-align-left input-icon textarea-icon"></i>
            <textarea id="itemDesc" placeholder="Descripción / Receta floral" required></textarea>
          </div>

          <div class="custom-dropdown" id="categoryDropdown">
            <div class="dropdown-trigger">
              <i class="fa-solid fa-layer-group dropdown-icon-left"></i>
              <span id="dropdownSelectedText">Ninguna categoría</span>
              <i class="fa-solid fa-chevron-down dropdown-arrow"></i>
            </div>
            <ul class="dropdown-menu">
              <li data-value="">Ninguna categoría</li>
              <li data-value="ramos">Ramos</li>
              <li data-value="funebre">Fúnebre</li>
              <li data-value="mega-ramos">Mega Ramos</li>
              <li data-value="canastas-premium">Canastas y ramos premium</li>
            </ul>
            <input type="hidden" id="itemCategory" value="">
          </div>

          <div class="occasions-sect" id="occasionsSection">
            <label class="sect-title"><i class="fa-solid fa-calendar-star"></i> Fechas Especiales / Ocasiones</label>
            <div class="checkbox-grid">
              <label class="checkbox-label">
                <input type="checkbox" name="occasion" value="san-valentin">
                <span class="custom-checkbox"></span>
                San Valentín
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="occasion" value="dia-madres">
                <span class="custom-checkbox"></span>
                Día de las Madres
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="occasion" value="flores-amarillas">
                <span class="custom-checkbox"></span>
                Flores Amarillas
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="occasion" value="cumpleanos">
                <span class="custom-checkbox"></span>
                Cumpleaños
              </label>
            </div>
          </div>
          
          <div class="file-input-wrapper">
            <label for="itemImg" class="file-label">
              <i class="fa-solid fa-cloud-arrow-up"></i>
              <span>Seleccionar imagen del arreglo</span>
            </label>
            <input type="file" id="itemImg" accept="image/*" required>
            <div id="file-name-preview" class="file-preview-text">Ningún archivo seleccionado</div>
          </div>

          <div class="image-preview-container" id="imagePreviewContainer">
            <button type="button" class="btn-remove-image" id="btnRemoveImage" title="Quitar imagen">
              <i class="fa-solid fa-xmark"></i>
            </button>
            <img src="" alt="Vista previa" id="imagePreview">
          </div>

          <button type="submit" id="submitBtn" class="btn-primary">Publicar en Catálogo</button>
          <div id="status"></div>
        </form>
      </div>
    </main>
  </div>

  <script type="module" src="js/upload.js"></script>
</body>
</html>
